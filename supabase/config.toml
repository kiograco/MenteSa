# Supabase CLI project config. Local dev values only — this file does not carry secrets.
# Run `supabase link --project-ref <your-ref>` once to point the CLI at your real project;
# that command updates project_id below to match.
project_id = "mindcare"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Set to your real app URL once deployed (e.g. https://mindcare.example.com) — used to build
# confirmation/recovery e-mail links (resetPasswordForEmail's redirectTo, signUp confirmation, etc.).
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = true
file_size_limit = "10MiB"
