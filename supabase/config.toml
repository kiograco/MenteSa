# Supabase CLI project config. Local dev values only — this file does not carry secrets.
# Run `supabase link --project-ref <your-ref>` once to point the CLI at your real project;
# that command updates project_id below to match.
project_id = "mindcare"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Used to build confirmation/recovery e-mail links (resetPasswordForEmail's redirectTo, signUp
# confirmation, etc.) and to validate OAuth/redirect callbacks.
site_url = "https://mente-sa-woad.vercel.app"
additional_redirect_urls = ["https://mente-sa-woad.vercel.app", "http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

# Routes Auth e-mails (confirmation, password recovery, etc.) through Resend's SMTP relay instead
# of Supabase's shared low-volume sender. Reuses the same RESEND_API_KEY already used by the
# booking-confirmation Edge Functions — set it in your shell before running `supabase config push`
# (never hardcode the actual key here; `env(...)` reads it from the environment at push time).
[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(RESEND_API_KEY)"
# Must be a sender Resend has verified for your account — the same address you set as EMAIL_FROM
# for the Edge Functions (Resend's sandbox domain onboarding@resend.dev works if you haven't
# verified your own domain yet). Update this to match.
admin_email = "onboarding@resend.dev"
sender_name = "MindCare"

[storage]
enabled = true
file_size_limit = "10MiB"

# The Supabase CLI defaults this to enabled = true when the section is omitted entirely, which
# doesn't match this project's free-tier remote config (vector buckets are a paid-tier feature)
# and made every `config push` fail with 402. Declared explicitly, matching remote, so there's
# nothing to diff. The actual professional-documents bucket is created by the SQL migration
# (20260703000001_professional_documents.sql), not by this file.
[storage.vector]
enabled = false
